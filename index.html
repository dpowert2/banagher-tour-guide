<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banagher Leisurely Tour — Lower Shannon Cruise Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCwU1X-mknScWu4beKJ7wjvehmLotGh-eY&libraries=places&callback=initMap" async defer></script>
<style>
:root {
  --bg: #E2E6ED;
  --surface: #FFFFFF;
  --surface-muted: #F3F4F6;
  --border: #E5E8EE;
  --text-primary: #111827;
  --text-body: #374151;
  --text-muted: #6B7280;
  --text-faint: #9CA3AF;
  --accent: #E84B3C;
  --accent-light: #FEF2F0;
  --data-blue: #7B9BB5;
  --data-blue-light: #D6E4EE;
  --data-dark: #1C1C2C;
  --data-grey: #D1D5DB;
  --success: #16A34A;
  --warning: #D97706;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-pill: 999px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-body);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* ── SPLIT LAYOUT ── */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Left panel: scrollable cards */
.panel-left {
  width: 480px;
  min-width: 380px;
  max-width: 520px;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
  padding: 20px 16px 40px;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--data-grey) transparent;
}
.panel-left::-webkit-scrollbar { width: 6px; }
.panel-left::-webkit-scrollbar-thumb { background: var(--data-grey); border-radius: 3px; }

/* Right panel: sticky map */
.panel-right {
  flex: 1;
  height: 100vh;
  position: relative;
  background: var(--surface);
}

#map {
  width: 100%;
  height: 100%;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 28px 16px 20px;
}
.header-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: var(--radius-pill);
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text-primary);
  line-height: 1.1;
  margin-bottom: 4px;
  font-weight: 400;
}
.header p {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 12px 8px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
  margin-bottom: 2px;
}
.stat-card .stat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ── ROUTE TIMELINE ── */
.timeline-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 16px;
  margin-bottom: 16px;
}
.timeline-card h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.timeline {
  display: flex;
  align-items: flex-start;
  overflow-x: auto;
  gap: 0;
  padding: 4px 0 8px;
}
.tl-stop {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 64px;
  flex-shrink: 0;
  cursor: pointer;
  transition: opacity 0.15s;
}
.tl-stop:hover { opacity: 0.8; }
.tl-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--data-blue);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}
.tl-dot.overnight { box-shadow: 0 0 0 3px var(--data-blue-light); }
.tl-name {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  line-height: 1.2;
  max-width: 64px;
}
.tl-night {
  font-size: 9px;
  color: var(--data-blue);
  font-weight: 600;
  margin-top: 1px;
}
.tl-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  padding-top: 4px;
}
.tl-line {
  width: 100%;
  height: 2px;
  background: var(--data-blue);
  margin-bottom: 4px;
}
.tl-line.return {
  background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 4px, transparent 4px, transparent 8px);
}
.tl-time {
  font-size: 9px;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
